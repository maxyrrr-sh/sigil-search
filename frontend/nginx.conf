server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # API calls -> backend container. The trailing slash on proxy_pass strips
    # the `/api` prefix: /api/search -> http://backend:9595/search.
    location /api/ {
        proxy_pass http://backend:9595/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
